<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        button {
            width: 100%; height: 100%; border: none;
            background-color: #f0f0f0; font-size: 24px; cursor: pointer;
            transition: background 0.2s;
        }
        button:active { background-color: #ff4757; color: white; }
    </style>
</head>
<body>
    <button id="testBtn" onclick="handleClick()">화면 전체가 버튼입니다.<br>클릭하면 반응합니다.</button>

    <script>
        function handleClick() {
            const btn = document.getElementById('testBtn');
            btn.style.backgroundColor = '#2ed573';
            btn.innerHTML = '<h1>CLICKED! (isTrusted: ' + event.isTrusted + ')</h1>';
            console.log('Clicked! isTrusted:', event.isTrusted);
            setTimeout(() => {
                btn.style.backgroundColor = '#f0f0f0';
                btn.innerHTML = '화면 전체가 버튼입니다.<br>클릭하면 반응합니다.';
            }, 1000);
        }
    </script>
</body>
</html>
